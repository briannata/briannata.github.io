<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Brianna Ta</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90' font-family='system-ui' font-weight='800'%3E%F0%9F%92%9C%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#080810;--accent:#8b5cf6;--accent-light:#a78bfa;--text:#f0eef8;--text-muted:#8b8a9e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;text-align:center;}
.code{font-family:'Syne',sans-serif;font-weight:800;font-size:clamp(5rem,18vw,10rem);line-height:1;letter-spacing:-0.04em;background:linear-gradient(135deg,var(--accent-light),var(--accent));-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:1rem;}
h1{font-family:'Syne',sans-serif;font-weight:700;font-size:clamp(1.5rem,4vw,2.25rem);margin-bottom:1rem;letter-spacing:-0.02em;}
p{color:var(--text-muted);max-width:420px;margin:0 auto 2rem;line-height:1.7;font-size:0.95rem;}
a{display:inline-block;padding:0.75rem 1.75rem;background:var(--accent);color:#fff;border:1px solid var(--accent);border-radius:4px;text-decoration:none;font-size:0.88rem;font-weight:500;letter-spacing:0.04em;transition:all 0.3s;}
a:hover{background:var(--accent-light);border-color:var(--accent-light);box-shadow:0 0 40px rgba(139,92,246,0.3);}
</style>
</head>
<body>
<div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved.</p>
  <a href="/">Back to home</a>
</div>
</body>
</html>
